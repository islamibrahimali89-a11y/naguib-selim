<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام المعاينات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f5f7ff;
margin:0;
padding:0;
direction:rtl
}

.header{
background:#2563c4;
color:#fff;
padding:12px;
text-align:center;
font-weight:bold
}

.container{
padding:15px
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px
}

button{
background:#2563c4;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer
}

.card{
background:white;
border-radius:10px;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd
}

.status{
font-size:12px;
padding:3px 8px;
border-radius:20px
}

.complete{background:#e6ffed;color:#16a34a}
.pending{background:#fff7ed;color:#ea580c}
.refused{background:#fee2e2;color:#dc2626}
</style>
</head>

<body>

<div class="header">
نظام معاينات نجيب سليم
</div>

<div class="container">

<h3>إضافة معاينة</h3>

<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">

<select id="status">
<option value="pending">انتظار</option>
<option value="complete">تامة</option>
<option value="refused">رفض</option>
</select>

<textarea id="notes" placeholder="ملاحظات"></textarea>

<button onclick="saveInspection()">حفظ المعاينة</button>

<hr>

<h3>المعاينات</h3>

<div id="list"></div>

</div>

<script>

const supabaseUrl="https://cyiawfszmepxurjfxlhi.supabase.co"
const supabaseKey="YOUR_KEY"

const sb=supabase.createClient(supabaseUrl,supabaseKey)

async function saveInspection(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const address=document.getElementById("address").value
const status=document.getElementById("status").value
const notes=document.getElementById("notes").value

await sb.from("inspections").insert({
client_name:name,
phone:phone,
address:address,
status:status,
notes:notes
})

loadData()

}async function loadData(){

const {data}=await sb
.from("inspections")
.select("*")
.order("id",{ascending:false})

let html=""

data.forEach(r=>{

html+=`
<div class="card">

<b>${r.client_name}</b>

<div>
📞 ${r.phone}
</div>

<div>
🏠 ${r.address}
</div>

<div class="status ${r.status}">
${r.status}
</div>

<div>
${r.notes||""}
</div>

</div>
`

})

document.getElementById("list").innerHTML=html

}

loadData()

</script>

</body>
</html>
